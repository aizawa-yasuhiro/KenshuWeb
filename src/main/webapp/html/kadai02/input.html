<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>課題２－１</title>

<style type="text/css">
<!--
table tr th{
	font-weight: normal;
	width: 100px;
	text-align: left;
	vertical-align: top;
	}
-->
</style>


</head>
<body>
	<form name="frm" method="post" action="/KenshuWeb/kadai02">
	<table>
		<tr>
			<th>名前</th>
			<td><input type="text" name="name"/></td>
		</tr>
		<tr>
			<th>住所</th>
			<td><textarea name="address" rows="4" cols="35"></textarea></td>
		</tr>
		<tr>
			<th>性別</th>
			<td>
				<input type="radio" name="sex" value="1" checked>男
				<input type="radio" name="sex" value="2">女
			</td>
		</tr>
		<tr>
			<th>職業</th>
			<td>
				<select name="job">
					<option value="1">自営業
					<option value="2">会社員
					<option value="3">会社役員
					<option value="9">無職
				</select>
			</td>
		</tr>
		<tr>
			<td></td>
			<td><input type="submit" value="送信"/></td>
		</tr>
	</table>
	</form>



</body>
</html>
